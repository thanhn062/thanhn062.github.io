<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Please wait...</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --card: #171a21;
      --text: #f7f4ed;
      --muted: #b7b1a6;
      --accent: #f58a2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #232733 0%, var(--bg) 60%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }
    .card {
      width: min(92vw, 560px);
      padding: 28px 24px;
      border: 1px solid rgba(245, 138, 42, 0.25);
      border-radius: 20px;
      background: rgba(23, 26, 33, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    button, a.button {
      appearance: none;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #1b130a;
      text-decoration: none;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }
    a.button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(247, 244, 237, 0.18);
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #8f8a82;
    }
    .hidden {
      display: none;
    }
    .ghost-player {
      position: fixed;
      width: 1px;
      height: 1px;
      left: -9999px;
      top: 0;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <video id="player" class="ghost-player" playsinline preload="auto" src="./media.mp4?v=1"></video>
  <main class="card">
    <h1>Please wait...</h1>
    <p id="status">Opening content.</p>
    <div class="actions">
      <a id="playBtn" class="button" href="./media.mp4?v=1">Tap here</a>
    </div>
    <p class="note" id="note">Tap here if nothing happens.</p>
  </main>
  <script>
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const note = document.getElementById('note');

    async function tryPlay() {
      try {
        player.muted = false;
        await player.play();
        status.textContent = 'Playing.';
        note.textContent = '';
        playBtn.classList.add('hidden');
      } catch (err) {
        try {
          player.muted = true;
          await player.play();
          status.textContent = 'Tap here.';
          note.textContent = '';
        } catch (innerErr) {
          status.textContent = 'Tap here.';
          note.textContent = '';
        }
      }
    }

    document.body.addEventListener('click', (event) => {
      if (event.target === playBtn) return;
      window.location.href = './media.mp4?v=1';
    });

    player.addEventListener('error', () => {
      status.textContent = 'Media file missing. Upload media.mp4 into this folder.';
      note.textContent = '';
      playBtn.classList.add('hidden');
    });

    tryPlay();
  </script>
</body>
</html>
