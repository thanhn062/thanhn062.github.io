<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading surprise...</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115;
      --card: #171a21;
      --text: #f7f4ed;
      --muted: #b7b1a6;
      --accent: #f58a2a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #232733 0%, var(--bg) 60%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }
    .card {
      width: min(92vw, 560px);
      padding: 28px 24px;
      border: 1px solid rgba(245, 138, 42, 0.25);
      border-radius: 20px;
      background: rgba(23, 26, 33, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    button, a.button {
      appearance: none;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #1b130a;
      text-decoration: none;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }
    a.button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(247, 244, 237, 0.18);
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #8f8a82;
    }
    audio {
      width: 100%;
      margin-top: 18px;
      filter: sepia(0.2) saturate(1.1);
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Loading your surprise...</h1>
    <p id="status">Trying autoplay now.</p>
    <audio id="player" autoplay playsinline preload="auto" src="./rickroll.mp3"></audio>
    <div class="actions">
      <button id="playBtn" class="hidden" type="button">Play surprise</button>
      <a class="button secondary" href="./rickroll.mp3">Open audio file</a>
    </div>
    <p class="note">For full autoplay, this page needs a real audio file at <code>rickroll/rickroll.mp3</code>.</p>
  </main>
  <script>
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    async function tryPlay() {
      try {
        await player.play();
        status.textContent = 'Now playing.';
      } catch (err) {
        status.textContent = 'Autoplay was blocked. Tap below.';
        playBtn.classList.remove('hidden');
      }
    }

    playBtn.addEventListener('click', async () => {
      try {
        await player.play();
        status.textContent = 'Now playing.';
        playBtn.classList.add('hidden');
      } catch (err) {
        status.textContent = 'Playback failed. Open the audio file directly.';
      }
    });

    player.addEventListener('error', () => {
      status.textContent = 'Audio file missing. Upload rickroll.mp3 into this folder.';
      playBtn.classList.add('hidden');
    });

    tryPlay();
  </script>
</body>
</html>
